<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RESUI — Renewability and Sustainability Initiative</title>
<meta name="description" content="Building infrastructure for sustainable engineering knowledge across universities. Coming soon.">
<link rel="icon" href="resui-favicon.png" type="image/png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --green: #2DC653;
    --green-dim: rgba(45, 198, 83, 0.12);
    --green-glow: rgba(45, 198, 83, 0.06);
    --bg: #060608;
    --surface: #0c0c10;
    --text: #e8e8ec;
    --text-dim: #e0e0e8;
    --text-muted: #3a3a45;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', system-ui, sans-serif;
    overflow: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  body::before {
    content: '';
    position: absolute;
    top: 20%;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, var(--green-glow) 0%, transparent 70%);
    pointer-events: none;
    animation: pulse 8s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.4; transform: translateX(-50%) scale(1); }
    50% { opacity: 0.7; transform: translateX(-50%) scale(1.1); }
  }

  canvas#grid {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }

  .content {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 2rem;
  }

  .logo-wrap {
    width: 280px;
    margin-bottom: 3rem;
    animation: fadeIn 1.2s ease-out;
  }

  .logo-wrap img {
    width: 100%;
    height: auto;
    display: block;
    filter: drop-shadow(0 0 20px rgba(45, 198, 83, 0.15)) drop-shadow(0 0 60px rgba(45, 198, 83, 0.06));
    background: rgba(255, 255, 255, 0.06);
    border-radius: 12px;
    padding: 16px 24px;
  }

  .status {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 6px 16px;
    border: 1px solid rgba(45, 198, 83, 0.25);
    border-radius: 100px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--green);
    margin-bottom: 2rem;
    animation: fadeIn 1.2s ease-out 0.3s both;
  }

  .status::before {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--green);
    animation: blink 2s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .tagline {
    font-size: 18px;
    font-weight: 400;
    color: var(--text-dim);
    line-height: 1.6;
    max-width: 420px;
    margin-bottom: 3rem;
    animation: fadeIn 1.2s ease-out 0.5s both;
  }

  .divider {
    width: 40px;
    height: 1px;
    background: var(--text-muted);
    margin-bottom: 2rem;
    animation: fadeIn 1.2s ease-out 0.7s both;
  }

  .contact {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--text-dim);
    animation: fadeIn 1.2s ease-out 0.9s both;
  }

  .contact a {
    color: var(--green);
    text-decoration: none;
    border-bottom: 1px solid rgba(45, 198, 83, 0.3);
    transition: border-color 0.3s;
  }

  .contact a:hover {
    border-color: var(--green);
  }

  .corner-mark {
    position: absolute;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: #e0e0e8;
    letter-spacing: 0.05em;
    z-index: 1;
  }

  .corner-mark.tl { top: 2rem; left: 2rem; }
  .corner-mark.br { bottom: 2rem; right: 2rem; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 480px) {
    .logo-wrap { width: 200px; }
    .tagline { font-size: 15px; padding: 0 1rem; }
    .corner-mark { display: none; }
  }
</style>
</head>
<body>

<canvas id="grid"></canvas>

<div class="corner-mark tl">RESUI / 2026</div>
<div class="corner-mark br">Renewability &amp; Sustainability Initiative</div>

<div class="content">
  <div class="logo-wrap">
    <img src="RESUI.png" alt="RESUI">
  </div>

  <div class="status">Under Development</div>

  <p class="tagline">
    Open-access infrastructure for renewable and sustainable engineering knowledge.
  </p>

  <div class="divider"></div>

  <div class="contact">
    <a href="mailto:contact@resui.org">contact@resui.org</a>
  </div>
</div>

<script>
(function() {
  const canvas = document.getElementById('grid');
  const ctx = canvas.getContext('2d');
  const spacing = 40;
  const glowRadius = 280;
  let mouse = { x: -1000, y: -1000 };
  let smooth = { x: -1000, y: -1000 };

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  document.addEventListener('mousemove', function(e) {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
  });
  document.addEventListener('mouseleave', function() {
    mouse.x = -1000;
    mouse.y = -1000;
  });
  document.addEventListener('touchmove', function(e) {
    mouse.x = e.touches[0].clientX;
    mouse.y = e.touches[0].clientY;
  });
  document.addEventListener('touchend', function() {
    mouse.x = -1000;
    mouse.y = -1000;
  });

  function distToSegment(px, py, x1, y1, x2, y2) {
    const dx = x2 - x1, dy = y2 - y1;
    const len2 = dx * dx + dy * dy;
    if (len2 === 0) return Math.hypot(px - x1, py - y1);
    let t = ((px - x1) * dx + (py - y1) * dy) / len2;
    t = Math.max(0, Math.min(1, t));
    return Math.hypot(px - (x1 + t * dx), py - (y1 + t * dy));
  }

  function draw() {
    smooth.x += (mouse.x - smooth.x) * 0.1;
    smooth.y += (mouse.y - smooth.y) * 0.1;

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const w = canvas.width;
    const h = canvas.height;
    const mx = smooth.x;
    const my = smooth.y;

    // Draw vertical lines
    for (let x = 0; x <= w; x += spacing) {
      const dist = Math.abs(x - mx);
      if (dist > glowRadius) {
        ctx.strokeStyle = 'rgba(58, 58, 69, 0.04)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, h);
        ctx.stroke();
      } else {
        // Draw segments with varying brightness near mouse
        const segSize = 4;
        for (let y = 0; y < h; y += segSize) {
          const d = Math.hypot(x - mx, y + segSize / 2 - my);
          const intensity = Math.max(0, 1 - d / glowRadius);
          const alpha = 0.04 + intensity * 0.15;
          const green = Math.round(58 + intensity * 80);
          ctx.strokeStyle = `rgba(${Math.round(intensity * 15)}, ${green}, ${Math.round(58 + intensity * 12)}, ${alpha})`;
          ctx.lineWidth = 1 + intensity * 0.3;
          ctx.beginPath();
          ctx.moveTo(x, y);
          ctx.lineTo(x, y + segSize);
          ctx.stroke();
        }
      }
    }

    // Draw horizontal lines
    for (let y = 0; y <= h; y += spacing) {
      const dist = Math.abs(y - my);
      if (dist > glowRadius) {
        ctx.strokeStyle = 'rgba(58, 58, 69, 0.04)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(w, y);
        ctx.stroke();
      } else {
        const segSize = 4;
        for (let x = 0; x < w; x += segSize) {
          const d = Math.hypot(x + segSize / 2 - mx, y - my);
          const intensity = Math.max(0, 1 - d / glowRadius);
          const alpha = 0.04 + intensity * 0.15;
          const green = Math.round(58 + intensity * 80);
          ctx.strokeStyle = `rgba(${Math.round(intensity * 15)}, ${green}, ${Math.round(58 + intensity * 12)}, ${alpha})`;
          ctx.lineWidth = 1 + intensity * 0.3;
          ctx.beginPath();
          ctx.moveTo(x, y);
          ctx.lineTo(x + segSize, y);
          ctx.stroke();
        }
      }
    }

    requestAnimationFrame(draw);
  }

  draw();
})();
</script>

</body>
</html>
