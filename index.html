<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RESUI — Renewability and Sustainability Initiative</title>
<meta name="description" content="Open-access infrastructure for renewable and sustainable engineering knowledge.">
<link rel="icon" href="resui-favicon.png" type="image/png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --green: #2DC653;
    --green-border: rgba(45, 198, 83, 0.25);
    --transition: 0.4s ease;
  }

  [data-theme="dark"] {
    --bg: #060608;
    --text: #e8e8ec;
    --text-dim: #e0e0e8;
    --text-muted: #3a3a45;
    --corner: #e0e0e8;
    --divider: #3a3a45;
    --glow: rgba(45, 198, 83, 0.06);
    --base-grid: rgba(58, 58, 69, 0.04);
  }

  [data-theme="light"] {
    --bg: #f4f5f7;
    --text: #111114;
    --text-dim: #333340;
    --text-muted: #c8c8d0;
    --corner: #555566;
    --divider: #c8c8d0;
    --glow: rgba(45, 198, 83, 0.08);
    --base-grid: rgba(0, 0, 0, 0.05);
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', system-ui, sans-serif;
    overflow: hidden;
    transition: background var(--transition), color var(--transition);
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  body::before {
    content: '';
    position: absolute;
    top: 20%;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, var(--glow) 0%, transparent 70%);
    pointer-events: none;
    animation: pulse 8s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.4; transform: translateX(-50%) scale(1); }
    50% { opacity: 0.7; transform: translateX(-50%) scale(1.1); }
  }

  canvas#grid {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }

  .content {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 2rem;
  }

  .logo-wrap {
    width: 280px;
    margin-bottom: 3rem;
    animation: fadeIn 1.2s ease-out;
    position: relative;
  }

  .logo-wrap::after {
    content: '';
    display: block;
    padding-bottom: 100%;
  }

  .logo-wrap img {
    width: 100%;
    height: auto;
    display: block;
    position: absolute;
    top: 0;
    left: 0;
    transition: opacity var(--transition);
  }

  .logo-dark { opacity: 1; }
  .logo-light { opacity: 0; }
  [data-theme="light"] .logo-dark { opacity: 0; }
  [data-theme="light"] .logo-light { opacity: 1; }

  .status {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 6px 16px;
    border: 1px solid var(--green-border);
    border-radius: 100px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--green);
    margin-bottom: 2rem;
    animation: fadeIn 1.2s ease-out 0.3s both;
  }

  .status::before {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--green);
    animation: blink 2s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .tagline {
    font-size: 18px;
    font-weight: 400;
    color: var(--text-dim);
    line-height: 1.6;
    max-width: 420px;
    margin-bottom: 3rem;
    animation: fadeIn 1.2s ease-out 0.5s both;
    transition: color var(--transition);
  }

  .divider {
    width: 40px;
    height: 1px;
    background: var(--divider);
    margin-bottom: 2rem;
    animation: fadeIn 1.2s ease-out 0.7s both;
    transition: background var(--transition);
  }

  .contact {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--text-dim);
    animation: fadeIn 1.2s ease-out 0.9s both;
    transition: color var(--transition);
  }

  .contact a {
    color: var(--green);
    text-decoration: none;
    border-bottom: 1px solid var(--green-border);
    transition: border-color 0.3s;
  }

  .contact a:hover {
    border-color: var(--green);
  }

  .corner-mark {
    position: absolute;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--corner);
    letter-spacing: 0.05em;
    z-index: 1;
    transition: color var(--transition);
  }

  .corner-mark.tl { top: 2rem; left: 2rem; }
  .corner-mark.br { bottom: 2rem; right: 2rem; }

  .theme-toggle {
    position: absolute;
    top: 2rem;
    right: 2rem;
    z-index: 10;
    width: 36px;
    height: 36px;
    border: 1px solid var(--text-muted);
    border-radius: 50%;
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color var(--transition);
  }

  .theme-toggle:hover {
    border-color: var(--green);
  }

  .theme-toggle svg {
    width: 16px;
    height: 16px;
    fill: none;
    stroke: var(--text-dim);
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
    transition: stroke var(--transition);
  }

  .icon-sun { display: none; }
  .icon-moon { display: block; }
  [data-theme="light"] .icon-sun { display: block; }
  [data-theme="light"] .icon-moon { display: none; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 480px) {
    .logo-wrap { width: 200px; }
    .tagline { font-size: 15px; padding: 0 1rem; }
    .corner-mark { display: none; }
  }
</style>
</head>
<body>

<button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
  <svg class="icon-moon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
  <svg class="icon-sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
</button>

<canvas id="grid"></canvas>

<div class="corner-mark tl">RESUI / 2026</div>
<div class="corner-mark br">Renewability &amp; Sustainability Initiative</div>

<div class="content">
  <div class="logo-wrap">
    <img class="logo-dark" src="RESUI-dark.png" alt="RESUI">
    <img class="logo-light" src="RESUI-light.png" alt="RESUI">
  </div>

  <div class="status">Under Development</div>

  <p class="tagline">
    Open-access infrastructure for renewable and sustainable engineering knowledge.
  </p>

  <div class="divider"></div>

  <div class="contact">
    <a href="mailto:contact@resui.org">contact@resui.org</a>
  </div>
</div>

<script>
function toggleTheme() {
  var html = document.documentElement;
  var next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
}

(function() {
  var canvas = document.getElementById('grid');
  var ctx = canvas.getContext('2d');
  var spacing = 40;
  var glowRadius = 280;
  var mouse = { x: -1000, y: -1000 };
  var smooth = { x: -1000, y: -1000 };

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  document.addEventListener('mousemove', function(e) { mouse.x = e.clientX; mouse.y = e.clientY; });
  document.addEventListener('mouseleave', function() { mouse.x = -1000; mouse.y = -1000; });
  document.addEventListener('touchmove', function(e) { mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY; });
  document.addEventListener('touchend', function() { mouse.x = -1000; mouse.y = -1000; });

  function isDark() { return document.documentElement.getAttribute('data-theme') === 'dark'; }

  function draw() {
    smooth.x += (mouse.x - smooth.x) * 0.1;
    smooth.y += (mouse.y - smooth.y) * 0.1;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    var w = canvas.width, h = canvas.height, mx = smooth.x, my = smooth.y;
    var dark = isDark();
    var baseStyle = dark ? 'rgba(58,58,69,0.04)' : 'rgba(0,0,0,0.05)';
    var segSize = 4;

    for (var x = 0; x <= w; x += spacing) {
      if (Math.abs(x - mx) > glowRadius) {
        ctx.strokeStyle = baseStyle; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke();
      } else {
        for (var y = 0; y < h; y += segSize) {
          var d = Math.hypot(x - mx, y + 2 - my);
          var t = Math.max(0, 1 - d / glowRadius);
          ctx.strokeStyle = 'rgba(' + Math.round(t*15) + ',' + Math.round(58+t*80) + ',' + Math.round(58+t*12) + ',' + (0.04+t*0.15) + ')';
          ctx.lineWidth = 1 + t * 0.3;
          ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x, y + segSize); ctx.stroke();
        }
      }
    }

    for (var y2 = 0; y2 <= h; y2 += spacing) {
      if (Math.abs(y2 - my) > glowRadius) {
        ctx.strokeStyle = baseStyle; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(0, y2); ctx.lineTo(w, y2); ctx.stroke();
      } else {
        for (var x2 = 0; x2 < w; x2 += segSize) {
          var d2 = Math.hypot(x2 + 2 - mx, y2 - my);
          var t2 = Math.max(0, 1 - d2 / glowRadius);
          ctx.strokeStyle = 'rgba(' + Math.round(t2*15) + ',' + Math.round(58+t2*80) + ',' + Math.round(58+t2*12) + ',' + (0.04+t2*0.15) + ')';
          ctx.lineWidth = 1 + t2 * 0.3;
          ctx.beginPath(); ctx.moveTo(x2, y2); ctx.lineTo(x2 + segSize, y2); ctx.stroke();
        }
      }
    }

    requestAnimationFrame(draw);
  }
  draw();
})();
</script>

</body>
</html>
